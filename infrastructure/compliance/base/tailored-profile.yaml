apiVersion: compliance.openshift.io/v1alpha1
kind: TailoredProfile
metadata:
  name: crc-friendly-cis
  namespace: openshift-compliance
spec:
  extends: ocp4-cis
  title: CIS Red Hat OpenShift dev-bundle for CRC
  description: Extends OCP4 CIS but disables hardware-specific checks for local dev.
  disableRules:
    - name: ocp4-configure-network-policies-rbac
      rationale: Not configured in crc
    - name: ocp4-etcd-encryption-check
      rationale: Not configured in crc
    - name: ocp4-fips-enabled
      rationale: Not configured in crc
    - name: ocp4-worker-storage-encryption
      rationale: Not configured in crc
