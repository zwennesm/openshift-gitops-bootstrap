apiVersion: operators.coreos.com/v1alpha1
kind: Subscription
metadata:
  name: rhacs-operator
  namespace: rhacs-operator
spec:
  config:
    nodeSelector:
      node-role.kubernetes.io/worker: "" # no dedicated infra node
    tolerations:
      - effect: NoSchedule
        key: node-role.kubernetes.io/worker # no dedicated infra node
