apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: acs-deployments
  namespace: openshift-gitops
spec:
  generators:
    - git:
        repoURL: git@github.com:zwennesm/openshift-gitops-bootstrap.git
        revision: HEAD
        directories:
          - path: clusters/*
  template:
    metadata:
      name: "cluster-{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: git@github.com:zwennesm/openshift-gitops-bootstrap.git
        targetRevision: HEAD
        path: "{{path}}"
      destination:
        server: "https://kubernetes.default.svc"
        namespace: "{{path.basename}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
