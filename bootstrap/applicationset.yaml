apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: cluster-apps-autodiscovery
  namespace: openshift-gitops
spec:
  generators:
    - matrix:
        generators:
          - git:
              repoURL: "https://github.com/zwennesm/openshift-gitops-bootstrap"
              revision: HEAD
              directories:
                - path: clusters/*
          - git:
              repoURL: "https://github.com/zwennesm/openshift-gitops-bootstrap"
              revision: HEAD
              directories:
                - path: "clusters/{{path.basename}}/*"
  template:
    metadata:
      name: "{{path[0].basename}}-{{path.basename}}"
    spec:
      project: default
      source:
        repoURL: "https://github.com/zwennesm/openshift-gitops-bootstrap"
        targetRevision: HEAD
        path: "{{path.path}}"
      destination:
        # Assumes your cluster is registered in Argo CD with its folder name
        name: "{{path[0].basename}}"
        namespace: openshift-gitops
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
